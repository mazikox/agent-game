# Test database configuration (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Docker Compose for tests to ensure isolation
spring.docker.compose.enabled=false
spring.data.redis.port=6380

spring.autoconfigure.exclude=org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration

# JWT Secret for testing environment
jwt.secret=hkrjh4j5hrehj56j65trhrhtyj6k754uhretyjuk
spring.jpa.show-sql=false

# Game Engine - suppress background ticks in tests to avoid race conditions
# (We manually trigger ticks in E2E tests for predictability)
game.engine.tick-rate=3600000
game.engine.tick-timeout=5s

# Spring Boot 4 Native Virtual Threads (Ensures applicationTaskExecutor is available)
spring.threads.virtual.enabled=true

# AI Property Placeholders (Prevents crashes in tests not using @ActiveProfiles("test"))
spring.ai.openai.api-key=dummy
spring.ai.openai.base-url=http://localhost:8080
spring.ai.openai.chat.options.model=dummy

# Logging - Clean up logs and suppress the massive Condition Evaluation Report
debug=false
logging.level.org.springframework.boot.autoconfigure.logging=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.com.agentgierka.mmo.security=INFO
