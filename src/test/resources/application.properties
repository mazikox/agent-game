# Test database configuration (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Docker Compose for tests to ensure isolation
spring.docker.compose.enabled=false

spring.autoconfigure.exclude=org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration

# JWT Secret for testing environment
jwt.secret=testSecretKeyForMMOProject2026Secure
spring.jpa.show-sql=false
