spring.application.name=mmo

# Development persistence settings
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.highlight_sql=false

# AI Configuration (Groq via Spring AI OpenAI)
spring.ai.openai.api-key=${GROQ_API_KEY}


spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.1-8b-instant
spring.ai.retry.max-attempts=1

# JWT Secret Key for local development (provided via environment variable)
jwt.secret=${JWT_SECRET}

# Spring Boot Docker Compose integration (Magic happens here)
spring.docker.compose.enabled=true

# Game Engine
game.engine.tick-rate=1s
game.engine.tick-timeout=5s

# Spring Boot 4 Native Virtual Threads
spring.threads.virtual.enabled=true
